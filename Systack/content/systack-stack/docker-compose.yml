
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: systack
      POSTGRES_PASSWORD: systackpass
      POSTGRES_DB: crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "8001:8000"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
