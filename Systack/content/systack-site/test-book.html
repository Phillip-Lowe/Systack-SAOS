<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="brand/favicon-16.png">
  <link rel="icon" type="image/png" sizes="192x192" href="brand/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="brand/apple-touch-icon.png">  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment — SyStack Demo</title>
  <style>
    :root {
      --navy: #1a365d;
      --teal: #0d9488;
      --cyan: #06b6d4;
      --light: #f8fafc;
      --dark: #0f172a;
      --error: #ef4444;
      --success: #22c55e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--light);
      color: var(--dark);
      line-height: 1.6;
    }
    .test-banner {
      background: var(--error);
      color: white;
      text-align: center;
      padding: 12px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      color: var(--navy);
      font-size: 28px;
      font-weight: 700;
    }
    .logo span {
      color: var(--teal);
    }
    h2 {
      text-align: center;
      color: var(--navy);
      margin-bottom: 8px;
      font-size: 24px;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 32px;
      font-size: 15px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: var(--navy);
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--teal);
    }
    .datetime-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--teal), var(--cyan));
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .submit-btn:hover {
      opacity: 0.9;
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .message {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      display: none;
    }
    .message.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }
    .message.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="test-banner">
    📅 LIVE DEMO — This is a working booking system. Try it out!
  </div>

  <div class="container">
    <div class="logo">
      <h1>Sy<span>Stack</span></h1>
    </div>

    <h2>Book Your Appointment</h2>
    <p class="subtitle">Try our automated booking system — confirmation + reminders included</p>

    <form id="bookingForm">
      <div class="form-group">
        <label for="customer_name">Full Name *</label>
        <input type="text" id="customer_name" name="customer_name" required placeholder="Jane Doe">
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required placeholder="jane@example.com">
      </div>

      <div class="form-group">
        <label for="phone">Phone (optional)</label>
        <input type="tel" id="phone" name="phone" placeholder="5015551234">
      </div>

      <div class="form-group">
        <label for="service">Service *</label>
        <select id="service" name="service" required>
          <option value="">Select a service...</option>
          <option value="Haircut">Haircut</option>
          <option value="Deluxe Cut">Deluxe Cut</option>
          <option value="Deep Clean">Deep Clean</option>
          <option value="Coaching Session">Coaching Session</option>
        </select>
      </div>

      <div class="datetime-row">
        <div class="form-group">
          <label for="appointment_date">Date *</label>
          <input type="date" id="appointment_date" name="appointment_date" required>
        </div>
        <div class="form-group">
          <label for="appointment_time">Time *</label>
          <input type="time" id="appointment_time" name="appointment_time" required>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        Book Appointment
      </button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById('bookingForm');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');
    const WEBHOOK_URL = 'https://n8n.systack.net/webhook/booking-website-demo';

    // Set min date to today
    document.getElementById('appointment_date').min = new Date().toISOString().split('T')[0];

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.className = 'message';
      message.textContent = '';

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span> Booking...';

      const formData = new FormData(form);
      const date = formData.get('appointment_date');
      const time = formData.get('appointment_time');
      const appointment_time = `${date} ${time}:00`;

      const payload = {
        customer_name: formData.get('customer_name'),
        email: formData.get('email'),
        phone: formData.get('phone') || null,
        service: formData.get('service'),
        appointment_time: appointment_time,
        source: 'test-website'
      };

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.success || response.ok) {
          message.className = 'message success';
          message.innerHTML = `
            <strong>Booking created!</strong><br>
            Check your email to confirm your appointment.
          `;
          form.reset();
        } else {
          throw new Error(data.message || 'Booking failed');
        }
      } catch (err) {
        message.className = 'message error';
        message.innerHTML = `
          <strong>Booking failed</strong><br>
          ${err.message || 'Please try again.'}
        `;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Book Appointment';
      }
    });
  </script>
</body>
</html>
