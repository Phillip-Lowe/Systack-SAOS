<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utopia Deli — Order Online</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../../brand/favicon-32.png">
  <style>
    :root {
      --navy: #001a2d;
      --navy-light: #002845;
      --teal: #007da9;
      --cyan: #00a1db;
      --cyan-bright: #00c5e0;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --green: #22c55e;
      --green-bg: #f0fdf4;
      --red: #ef4444;
      --red-bg: #fef2f2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: var(--gray-800);
      background: var(--gray-50);
    }

    .container { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }

    /* Header */
    header {
      text-align: center;
      padding: 20px 0 28px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .brand-mark {
      width: 48px; height: 48px; border-radius: 12px;
      overflow: hidden; box-shadow: 0 2px 8px rgba(0,161,219,0.25);
    }
    .brand-mark img { width: 100%; height: 100%; object-fit: cover; }
    .brand-name { font-size: 28px; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; }
    .brand-name span { color: var(--cyan); }
    .tagline { font-size: 14px; color: var(--gray-600); margin-top: 2px; }

    /* Cards */
    .card {
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--gray-200);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 20px;
      color: var(--navy);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Menu */
    .menu-category { margin-bottom: 20px; }
    .menu-category h4 {
      font-size: 15px;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--gray-200);
    }
    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .menu-item:last-child { border-bottom: none; }
    .item-name { font-weight: 600; font-size: 15px; }
    .item-price { color: var(--gray-600); font-size: 14px; margin-left: 8px; }
    .qty-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .qty-control button {
      width: 32px; height: 32px;
      border: none; border-radius: 8px;
      background: var(--gray-100);
      color: var(--gray-800);
      font-size: 18px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .qty-control button:hover { background: var(--gray-200); }
    .qty-control button:active { background: var(--cyan); color: white; }
    .qty {
      min-width: 24px;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
    }

    /* Cart */
    .cart-empty {
      text-align: center;
      color: var(--gray-400);
      font-size: 14px;
      padding: 12px 0;
    }
    .cart-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px dashed var(--gray-200);
    }
    .cart-row:last-child { border-bottom: none; }
    .cart-totals { margin-top: 14px; padding-top: 14px; border-top: 2px solid var(--gray-800); }
    .cart-totals .row {
      display: flex; justify-content: space-between;
      font-size: 14px; padding: 3px 0;
    }
    .cart-totals .row.total {
      font-size: 18px; font-weight: 800;
      color: var(--navy);
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--gray-200);
    }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: 6px;
    }
    .form-group label .req { color: var(--red); margin-left: 2px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      background: var(--white);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,161,219,0.1);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    /* Messages */
    .msg {
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error { background: var(--red-bg); color: #991b1b; border: 1px solid #fecaca; }
    .msg.success { background: var(--green-bg); color: #166534; border: 1px solid #bbf7d0; }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--cyan), var(--teal));
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(0,161,219,0.35);
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,161,219,0.45);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    footer {
      text-align: center;
      padding: 30px 0 0;
      color: var(--gray-400);
      font-size: 13px;
    }
    footer a { color: var(--cyan); text-decoration: none; }
  </style>
</head>
<body>

<div class="container">

  <header>
    <div class="brand">
      <div class="brand-mark"><img src="../../brand/logo-header.png" alt="Utopia Deli" width="48" height="48"></div>
      <div>
        <div class="brand-name">Utopia <span>Deli</span></div>
        <div class="tagline">Order online for pickup</div>
      </div>
    </div>
  </header>

  <!-- Menu -->
  <div class="card">
    <h2>🥪 Menu</h2>
    <div id="menu-list">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Cart -->
  <div class="card">
    <h2>🛒 Your Order</h2>
    <div id="cart-empty" class="cart-empty">Tap + to add items</div>
    <div id="cart-list"></div>
    <div class="cart-totals">
      <div class="row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="row"><span>Tax (9.52%)</span><span id="tax">$0.00</span></div>
      <div class="row total"><span>Total</span><span id="total">$0.00</span></div>
    </div>
  </div>

  <!-- Customer Info -->
  <div class="card">
    <h2>👤 Your Info</h2>
    <form id="order-form">
      <div class="form-group">
        <label>Full Name <span class="req">*</span></label>
        <input type="text" id="customer-name" placeholder="Jane Doe" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email <span class="req">*</span></label>
          <input type="email" id="customer-email" placeholder="jane@example.com" required>
        </div>
        <div class="form-group">
          <label>Phone <span class="req">*</span></label>
          <input type="tel" id="customer-phone" placeholder="(501) 555-1234" required>
        </div>
      </div>

      <div class="form-group">
        <label>Pickup Time <span class="req">*</span></label>
        <select id="pickup-time" required>
          <option value="">Select a time…</option>
          <option value="ASAP">ASAP (approx 30 min)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Special Instructions</label>
        <textarea id="special-instructions" placeholder="Extra sauce, no onions, allergies, etc."></textarea>
      </div>

      <div id="error-msg" class="msg error"></div>
      <div id="success-msg" class="msg success"></div>

      <button type="submit" class="submit-btn" id="submit-btn" disabled>Place Order</button>
    </form>
  </div>

  <footer>
    <p>Questions? Call <a href="tel:+15012746231">(501) 274-6231</a></p>
    <p style="margin-top:6px;">Powered by SyStack.net</p>
  </footer>

</div>

<script src="order-form.js"></script>
</body>
</html>
