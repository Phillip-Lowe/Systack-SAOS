<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get your SAOS Fleet demo — tell us about your business and we'll build your custom demo in 24 hours.">
    <meta property="og:title" content="Get Your SAOS Fleet — Free Demo">
    <meta property="og:description" content="Tell us about your business. We'll build your custom demo in 24 hours.">
    <meta property="og:url" content="https://systack.net/saos/demo.html">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/brand/favicon-16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/brand/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-icon.png">
    <title>Get Your SAOS Fleet — Free Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #001a2d 0%, #002845 50%, #007da9 100%);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 520px;
            width: 100%;
        }
        .form-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
        }
        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .form-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #001a2d;
            margin-bottom: 8px;
        }
        .form-header p {
            color: #475569;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00a1db;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .radio-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .radio-option {
            flex: 1;
            min-width: 120px;
        }
        .radio-option input {
            display: none;
        }
        .radio-option label {
            display: block;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            transition: all 0.2s;
        }
        .radio-option input:checked + label {
            border-color: #00a1db;
            background: rgba(0, 161, 219, 0.05);
            color: #00a1db;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #00a1db;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-submit:hover {
            background: #007da9;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 161, 219, 0.3);
        }
        .trust-badges {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .trust-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #94a3b8;
        }
        .success-message {
            display: none;
            text-align: center;
            padding: 40px 0;
        }
        .success-message h2 {
            font-size: 28px;
            color: #22c55e;
            margin-bottom: 12px;
        }
        .success-message p {
            color: #475569;
            font-size: 16px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #00a1db;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card" id="formCard">
            <div class="form-header">
                <h1>Get Your SAOS Fleet</h1>
                <p>Tell us about your business. We'll build your demo in 24 hours.</p>
            </div>
            
            <form id="leadForm" action="https://n8n.systack.net/webhook/saos-lead" method="POST">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="John Smith">
                </div>
                
                <div class="form-group">
                    <label for="business">Business Name *</label>
                    <input type="text" id="business" name="business_name" required placeholder="Your Food Truck">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="(501) 555-0123">
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required placeholder="you@business.com">
                </div>
                
                <div class="form-group">
                    <label>Industry *</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="food" name="industry" value="food" required>
                            <label for="food">🍔 Food</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="legal" name="industry" value="legal">
                            <label for="legal">⚖️ Legal</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="medical" name="industry" value="medical">
                            <label for="medical">🏥 Medical</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="other" name="industry" value="other">
                            <label for="other">🏢 Other</label>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Fleet Size *</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="solo" name="fleet_size" value="solo" required>
                            <label for="solo">1 Agent</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="business" name="fleet_size" value="business">
                            <label for="business">3 Agents</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="enterprise" name="fleet_size" value="enterprise">
                            <label for="enterprise">5+ Agents</label>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="message">What do you want your agents to handle? (Optional)</label>
                    <textarea id="message" name="message" placeholder="e.g., Take orders by text, process invoices, qualify leads..."></textarea>
                </div>
                
                <button type="submit" class="btn-submit">Get My Free Demo →</button>
                
                <div class="trust-badges">
                    <div class="trust-badge">🔒 SSL Secure</div>
                    <div class="trust-badge">📧 Response in 24h</div>
                    <div class="trust-badge">💳 No credit card</div>
                </div>
            </form>
            
            <div class="success-message" id="successMessage">
                <h2>✓ Demo Requested!</h2>
                <p>We're building your custom demo now. Check your email in 24 hours.</p>
                <a href="/saos/" class="back-link">← Back to SAOS</a>
            </div>
        </div>
        
        <a href="/saos/" class="back-link" style="color: rgba(255,255,255,0.7);">← Back to SAOS</a>
    </div>
    
    <script>
        document.getElementById('leadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var form = this;
            var data = new FormData(form);
            var json = {};
            data.forEach(function(value, key) {
                if (json[key]) {
                    if (Array.isArray(json[key])) {
                        json[key].push(value);
                    } else {
                        json[key] = [json[key], value];
                    }
                } else {
                    json[key] = value;
                }
            });
            
            fetch(form.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(json)
            })
            .then(function(response) {
                if (response.ok) {
                    form.style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                } else {
                    alert('Something went wrong. Please try again or email support@systack.net');
                }
            })
            .catch(function(error) {
                console.error('Error:', error);
                alert('Something went wrong. Please try again or email support@systack.net');
            });
        });
    </script>
</body>
</html>
